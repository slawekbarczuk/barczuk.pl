<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website temporarily unavailable</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7fbff;
      color: #12314b;
      text-align: center;
      padding: 24px;
    }
    main {
      max-width: 620px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1;
      margin: 0 0 18px;
      letter-spacing: -0.04em;
    }
    p {
      color: #61758b;
      font-size: 1.05rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Website temporarily unavailable</h1>
    <p>This website is currently under review and will be available again soon.</p>
  </main>
</body>
</html>
